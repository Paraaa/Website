services:
    reverse-proxy:
        image: caddy:alpine
        restart: unless-stopped
        ports:
            - "80:80"
            - "443:443"
        environment:
            - DOMAIN=${DOMAIN}
        volumes:
            - .:/etc/caddy
            - caddy_data:/data
            - caddy_config:/config
        depends_on:
            - website
        networks:
            - public

    website:
        build: .
        networks:
            - intranet
            - public

networks:
    intranet:
    public:

volumes:
    caddy_data:
    caddy_config:
